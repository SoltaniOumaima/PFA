<!DOCTYPE html>

<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Chatbot PFA</title>

<style>
body {
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(135deg, #4facfe, #00f2fe);
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  margin: 0;
}

.chat-container {
  width: 400px;
  height: 600px;
  background: white;
  border-radius: 20px;
  display: flex;
  flex-direction: column;
  box-shadow: 0 10px 30px rgba(0,0,0,0.2);
  overflow: hidden;
}

.header {
  background: #4facfe;
  color: white;
  padding: 15px;
  text-align: center;
  font-weight: bold;
}

.messages {
  flex: 1;
  padding: 10px;
  overflow-y: auto;
  display: flex;
  flex-direction: column;
}

.message {
  max-width: 70%;
  padding: 10px;
  margin: 5px;
  border-radius: 10px;
  animation: fadeIn 0.3s ease;
}

.user {
  align-self: flex-end;
  background: #4facfe;
  color: white;
}

.bot {
  align-self: flex-start;
  background: #eaeaea;
}

.input-area {
  display: flex;
  border-top: 1px solid #ddd;
}

input {
  flex: 1;
  padding: 10px;
  border: none;
  outline: none;
}

button {
  background: #4facfe;
  color: white;
  border: none;
  padding: 10px 15px;
  cursor: pointer;
}

button:hover {
  background: #007bff;
}

.typing {
  font-style: italic;
  font-size: 12px;
  color: gray;
  margin-left: 10px;
}

@keyframes fadeIn {
  from {opacity: 0; transform: translateY(10px);}
  to {opacity: 1; transform: translateY(0);}
}
</style>

</head>

<body>

<div class="chat-container">
  <div class="header">🤖 Chatbot Incidents</div>

  <div class="messages" id="messages"></div>

  <div class="typing" id="typing"></div>

  <div class="input-area">
    <input type="text" id="input" placeholder="Écrire votre message..." />
    <button onclick="send()">Envoyer</button>
  </div>
</div>

<script>
async function send() {
  const input = document.getElementById("input");
  const msg = input.value.trim();

  if (!msg) return;

  addMessage(msg, "user");
  input.value = "";

  showTyping(true);

  try {
    const response = await fetch("http://localhost:5678/webhook/chatbot", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ question: msg })
    });

    const data = await response.json();

    showTyping(false);

    addMessage(data.message || JSON.stringify(data), "bot");

  } catch (error) {
    showTyping(false);
    addMessage("Erreur de connexion 😢", "bot");
  }
}

function addMessage(text, type) {
  const msgDiv = document.createElement("div");
  msgDiv.className = "message " + type;
  msgDiv.innerText = text;

  document.getElementById("messages").appendChild(msgDiv);
  msgDiv.scrollIntoView();
}

function showTyping(show) {
  document.getElementById("typing").innerText = show ? "Bot est en train d'écrire..." : "";
}

// envoyer avec Enter
document.getElementById("input").addEventListener("keypress", function(e) {
  if (e.key === "Enter") send();
});
</script>

</body>
</html>
